# Logrotate configuration for Sarah server logs
# Mounted into container at /etc/logrotate.d/sarah
# Run via: logrotate /etc/logrotate.d/sarah
# Or add to cron: 0 0 * * * logrotate /etc/logrotate.d/sarah

/app/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    maxsize 50M
    su root root
}
