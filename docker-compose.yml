services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rdgbot}
      POSTGRES_USER: ${POSTGRES_USER:-redegal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/config/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redegal}"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD} --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "0.0.0.0:9456:9456"
    env_file: .env
    environment:
      PORT: 9456
      BIND_HOST: 0.0.0.0
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./widget/dist:/app/public/widget:ro
      - ./dashboard/dist:/app/public/dashboard:ro
      - server_logs:/app/logs
      - backups:/backups
      - ./docker/logrotate.conf:/etc/logrotate.d/sarah:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9456/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  backup:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-rdgbot}
      POSTGRES_USER: ${POSTGRES_USER:-redegal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - ./server/scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - backups:/backups
    entrypoint: ["/bin/sh", "-c", "/usr/local/bin/backup.sh"]
    profiles:
      - backup

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M

  janus:
    image: rdg-janus-arm64:latest
    command: ["--config=/etc/janus/janus.jcfg", "--configs-folder=/etc/janus"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8088"          # REST API (server -> janus, internal only)
      - "127.0.0.1:8188:8188"          # WebSocket bound to localhost (widget -> janus via nginx)
      - "127.0.0.1:7088:7088"          # Admin API (internal only)
      - "10000-10200:10000-10200/udp"   # RTP media
    volumes:
      - ./janus/janus.jcfg:/etc/janus/janus.jcfg:ro
      - ./janus/janus.transport.http.jcfg:/etc/janus/janus.transport.http.jcfg:ro
      - ./janus/janus.transport.websockets.jcfg:/etc/janus/janus.transport.websockets.jcfg:ro
      - ./janus/janus.plugin.sip.jcfg:/etc/janus/janus.plugin.sip.jcfg:ro
      - ./janus/recordings:/tmp/janus-recordings
    environment:
      - JANUS_NAT_1_1_MAPPING=${SERVER_PUBLIC_IP:-}
      - JANUS_SIP_LOCAL_IP=${SERVER_PUBLIC_IP:-}
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  redisdata:
  backups:
  server_logs:
