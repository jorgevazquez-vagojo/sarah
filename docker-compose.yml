services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redegal_chatbot}
      POSTGRES_USER: ${POSTGRES_USER:-redegal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/config/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redegal}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD} --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "0.0.0.0:9456:9456"
    env_file: .env
    environment:
      PORT: 9456
      BIND_HOST: 0.0.0.0
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./widget/dist:/app/public/widget:ro
      - ./dashboard/dist:/app/public/dashboard:ro

  janus:
    image: canyan/janus-gateway:latest
    ports:
      - "8088:8088"                    # REST API (server → janus)
      - "8188:8188"                    # WebSocket (widget → janus)
      - "7088:7088"                    # Admin API
      - "10000-10200:10000-10200/udp"  # RTP media
    volumes:
      - ./janus/janus.jcfg:/etc/janus/janus.jcfg:ro
      - ./janus/janus.transport.http.jcfg:/etc/janus/janus.transport.http.jcfg:ro
      - ./janus/janus.transport.websockets.jcfg:/etc/janus/janus.transport.websockets.jcfg:ro
      - ./janus/janus.plugin.sip.jcfg:/etc/janus/janus.plugin.sip.jcfg:ro
      - ./janus/recordings:/tmp/janus-recordings
    environment:
      - JANUS_NAT_1_1_MAPPING=${SERVER_PUBLIC_IP:-}
      - JANUS_SIP_LOCAL_IP=${SERVER_PUBLIC_IP:-}
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
