# Boostic - Plataforma de Optimizacion de Catalogo para E-commerce
# Sources:
#   - https://www.boostic.cloud/es/
#   - https://www.redegal.com/es/servicios/
entries:
  - title: "Que es Boostic"
    category: producto
    content: |
      Boostic (boostic.cloud) es una plataforma de analisis y optimizacion de catalogo de producto
      desarrollada por Redegal, disenada especificamente para negocios e-commerce.
      Es la unica solucion del mercado que analiza tu catalogo para indicarte donde esta el verdadero
      potencial de ventas y optimiza automaticamente la inversion para incrementar el ROI entre un 15-30%.
      Boostic combina analitica predictiva con inteligencia artificial para maximizar el rendimiento
      de los catalogos de producto en campanas publicitarias.

  - title: "Funcionalidades principales de Boostic"
    category: producto
    content: |
      1. Optimizacion de ROI: reasigna automaticamente presupuesto publicitario de productos con bajo
         rendimiento a los que mejor convierten. Incrementa el ROAS entre un 15-30%.
      2. Automatizacion y ahorro de tiempo: automatiza reportes y analisis de catalogo, recuperando
         aproximadamente 10+ horas semanales para los equipos.
      3. Visibilidad e insights: centraliza datos de rendimiento de multiples fuentes en dashboards
         unificados. Proporciona insights generados por IA para SKUs individuales.
         Identifica productos con problemas, anomalias o potencial oculto.
      4. Segmentacion inteligente: agrupa productos en clusters basados en ROI para optimizacion
         automatica de campanas. Soporta segmentacion por tags, categorias, marcas y clusters.

  - title: "Como funciona Boostic"
    category: producto
    content: |
      Boostic opera en cuatro pasos:
      1. Conecta las fuentes de datos clave (Google Analytics 4, Google Ads, Meta Ads, SEO).
      2. Analiza el rendimiento real de cada producto del catalogo.
      3. Agrupa el catalogo en clusters inteligentes basados en ROI.
      4. Exporta etiquetas a feeds para optimizacion automatica de campanas.

  - title: "Integraciones de Boostic"
    category: producto
    content: |
      - Google Analytics 4 (GA4).
      - Google Ads y Google Merchant Center / Shopping feeds.
      - Meta Ads (Facebook/Instagram).
      - Plataformas de display y retargeting: Criteo, RTB House.
      - Herramientas SEO.
      Soporta exportacion de datos y tags personalizados a feeds de producto.

  - title: "Publico objetivo de Boostic"
    category: producto
    content: |
      Negocios e-commerce que buscan optimizacion de catalogo basada en datos.
      Empresas con catalogos extensos de producto que necesitan maximizar ROI publicitario.
      Equipos de marketing digital y paid media que gestionan campanas de Shopping y feeds.
      Retailers y marcas DTC (Direct-to-Consumer) con presencia online.

  - title: "Diferencial de Boostic"
    category: ventajas
    content: |
      - Unica solucion del mercado centrada en analisis y optimizacion automatica de catalogo.
      - Enfoque data-driven con insights generados por IA a nivel de SKU individual.
      - Integracion nativa con el ecosistema de servicios de Redegal (SEO, Paid Media, Analytics).
      - Ahorro de tiempo significativo: automatiza tareas manuales de analisis de catalogo.
      - Resultados medibles: incremento de ROAS del 15-30% demostrado.
      - Deteccion automatica de anomalias y oportunidades ocultas en el catalogo.
