  - title: "Valores de empresa"
    category: empresa
    content: |
      Los seis valores fundamentales de Redegal:
      1. Personas: atraccion y retencion de talento. El equipo humano es lo primero.
      2. Cliente: alineacion con resultados del cliente y enfoque centrado en sus necesidades.
      3. Compromiso: resolucion de problemas y dedicacion a cada proyecto.
      4. Flexibilidad: adaptabilidad al cambio y capacidad de respuesta agil.
      5. Honestidad: relaciones construidas sobre confianza y respeto.
      6. Pasion por la innovacion: busqueda constante de mejora y aprendizaje.

  - title: "Modelo de trabajo"
    category: empresa
    content: |
      Redegal combina equipos presenciales y remotos con modelo remote-first.
      "El secreto de un gran equipo esta en las personas, no en un espacio concreto."
      Ofrece trabajo hibrido para la mayoria de posiciones.
      Beneficios: salarios competitivos, teletrabajo flexible, dias extra de vacaciones,
      jornada intensiva los viernes, horario de verano ampliado, seguro medico.
      Metodologia agil (Scrum/Kanban) con sprints de 2 semanas.
      Stack tecnologico: React, Node.js, Python, Java, PHP, Angular, Vue.js, AWS, GCP,
      BigQuery, Looker, Magento, Shopify, BigCommerce.

