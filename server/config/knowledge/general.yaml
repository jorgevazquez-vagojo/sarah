entries:
  - title: "Sobre Redegal"
    category: empresa
    content: |
      Redegal es una consultora full digital espanola fundada en 2004 con sede central en Ourense (Galicia, Espana).
      Nacio como empresa de ingenieria de servicios TI junto a la Escuela Superior de Ingenieria Informatica (ESEI)
      de Ourense. En 2007 pionero en desarrollo movil tras el lanzamiento del iPhone. En 2010 se especializo en
      e-commerce y en 2013 lanzo su unidad de marketing digital. Cuenta con mas de 20 anos de experiencia,
      mas de 160 profesionales y mas de 200 clientes en diversos sectores.
      Cotiza en BME Growth (ticker RDG, ISIN ES0105857009) desde julio de 2025, tras debutar en BME Scaleup
      en enero de 2025. Fue la primera empresa en incorporarse a BME Growth ese ano.
      Redegal ofrece servicios integrales de transformacion digital a traves de tres unidades de negocio:
      Tech, Digital Business y Product (Boostic y Binnacle Data).
      Proposito: "Acompanar a los clientes hacia el exito en su negocio digital."
      Vision: "Acelerar el crecimiento del cliente en el entorno digital con el mejor equipo humano."

  - title: "Historia y hitos"
    category: empresa
    content: |
      2004 - Fundacion en Ourense como empresa de ingenieria de servicios TI.
      2007 - Primeros proyectos de desarrollo movil tras lanzamiento del iPhone.
      2008 - Traslado al Tecnopole (Parque Tecnologico de Galicia) con equipo de 9 personas.
      2010 - Especializacion en desarrollo e-commerce.
      2011 - Expansion internacional: apertura de oficina en Ciudad de Mexico.
      2013 - Lanzamiento de la unidad de marketing digital.
      2014 - Crecimiento del equipo de 20 a 50 personas. Expansion por Espana.
      2015 - Apertura de sede central en Ourense con espacio colaborativo.
      2018 - Consolidacion con casi 100 empleados y 6 millones de euros de facturacion.
      2025 (enero) - Debut en BME Scaleup a 7,00 EUR/accion. Revalorizacion del 20% el primer dia.
      2025 (julio) - Incorporacion a BME Growth a 8,80 EUR/accion (cap. bursatil: 19,16M EUR).
      Ampliacion de capital de 3,8 millones de euros (superando objetivo de 3M).
      Axon Partners se convierte en accionista de referencia junto a las familias Vazquez y De Prado.

