  - title: "Planes y precios de Binnacle Data"
    category: precio
    content: |
      Binnacle Data ofrece 3 planes:
      1. Plan Marketing - Desde 99 EUR/mes (con escalado por volumen):
         - Seguimiento de tu negocio en un solo lugar.
         - Monitorizacion activa con IA.
         - Integraciones: GA4, Google Search Console, Google Ads, Meta Ads, Bing Ads.
      2. Plan E-commerce - Desde 299 EUR/mes + fee de configuracion:
         - Todo lo del plan Marketing mas:
         - Analisis avanzado de productos.
         - Analisis RFM (Recency, Frequency, Monetary).
         - Metricas de Life Time Value (LTV) y recurrencia de compra.
         - Atribucion basada en datos (data-driven attribution).
         - Integraciones e-commerce: Magento, PrestaShop, Shopify, custom.
      3. Plan Personalizado - Precio a consultar:
         - Todo lo del plan E-commerce mas:
         - Gestion avanzada y dashboards personalizados.
         - Soporte para +30 fuentes de datos.
         - Fuentes de datos personalizadas.
         - Procesamiento de datos custom y analisis cruzados.
      Todos los planes incluyen solicitud de demo gratuita.

  - title: "Resultados demostrados de Binnacle Data"
    category: caso_exito
    content: |
      Metricas demostradas de la plataforma:
      - Ahorro del 80% del tiempo dedicado a consultar multiples fuentes de datos.
      - +30% de incremento en ventas en contextos e-commerce.
      - +100 metricas accesibles en un solo lugar.
      - +30 metricas monitorizadas automaticamente.
      - 10 tipos de elementos rastreados (productos, campanas, landings, SEO, conversiones...).
      Caso de exito con clusterizacion (retailer +300K productos):
      - +64% en clics capturados.
      - +40% en adiciones al carrito.
      - -50% en gasto publicitario en productos que no convierten.

  - title: "Servicio de Analitica Digital de Redegal"
    category: servicio
    content: |
      Ademas de la plataforma Binnacle Data, Redegal ofrece servicios de analitica digital
      con consultoria personalizada:
      Herramientas: Google Analytics (GA4), Looker Studio, herramientas de verificacion de datos.
      Capacidades de medicion:
      - Trafico por tipo de dispositivo, tasa de rebote, tasas de conversion.
      - Valor medio de vida del cliente (LTV), coste de adquisicion de cliente (CAC).
      - ROAS (retorno de inversion publicitaria).
      - Rendimiento de redes sociales y analisis competitivo.
      Entregables: dashboards personalizados en Looker Studio, reportes accionables,
      interpretacion de datos para toma de decisiones estrategicas.
      Lema: "Mide todo lo que sucede en tu web, e-commerce o campanas digitales."

