  - title: "Analisis RFM en Binnacle Data"
    category: funcionalidad
    content: |
      Binnacle Data incluye analisis RFM (Recency, Frequency, Monetary) en el plan E-commerce.
      RFM es una metodologia de segmentacion de clientes que clasifica segun:
      - Recency: cuando fue la ultima compra del cliente.
      - Frequency: con que frecuencia compra el cliente.
      - Monetary: cuanto gasta el cliente.
      Permite identificar clientes de alto valor, clientes en riesgo de abandono,
      y oportunidades de fidelizacion y recuperacion. Disponible como guia practica
      en el blog de Binnacle Data.

  - title: "Atribucion de datos en Binnacle Data"
    category: funcionalidad
    content: |
      Binnacle Data ofrece modelos de atribucion basados en datos (data-driven attribution)
      en el plan E-commerce y superior. Permite entender que canales y touchpoints
      contribuyen realmente a las conversiones, superando las limitaciones de modelos
      de atribucion simplistas (ultimo clic, primer clic). El blog incluye una guia
      sobre como lograr un modelo de atribucion personalizado.
