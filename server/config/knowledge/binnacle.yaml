# --- Knowledge Entries ---
entries:
  - title: "Que es Binnacle Data"
    category: producto
    content: |
      Binnacle Data (binnacledata.com) es una plataforma de analitica web y business intelligence
      desarrollada por Redegal que consolida datos de multiples fuentes en un dashboard unificado.
      Transforma informacion en conocimiento para impulsar el exito del negocio.
      Ofrece acceso a mas de 100 metricas de multiples fuentes en un solo lugar,
      conectando datos de comportamiento, conversiones, ventas e inversion publicitaria.
      Su lema principal es: "Mide, monitoriza y mejora el rendimiento de tu negocio desde un solo lugar."
      Nombre legal: BINNACLE, NIF B-32318354, con sede en Rua Telleira 11, Ourense, Espana.

  - title: "Funcionalidades principales de Binnacle Data"
    category: producto
    content: |
      1. Integracion de datos: acceso a +100 metricas de multiples fuentes en un solo lugar.
         Conecta datos de comportamiento, conversiones, ventas e inversion publicitaria.
      2. Monitorizacion con IA (Smart Monitoring): analisis automatico de +30 metricas en
         10 tipos de elementos (productos, categorias, campanas, landing pages, fuentes de trafico,
         rankings SEO, compras, etc). Detecta anomalias y genera notificaciones con insights
         y recomendaciones. Analiza 20 metricas diferentes para identificar cambios de tendencia.
      3. Insights de e-commerce: rendimiento de producto y calidad de cliente.
         Recuperacion y fidelizacion de clientes. Analisis RFM y LTV por cohortes.
      4. Dashboards y reporting: datos ordenados y accionables en dashboards personalizados.
         Interpretacion clara de datos para toma de decisiones.
      5. Comparativa de plataformas publicitarias: medicion unificada de Google Ads, Meta Ads
         y Microsoft Ads en un mismo entorno.
      6. Analisis de productos: combina datos de GA4, backoffice y Google Merchant para
         identificar productos con buen o mal rendimiento en multiples aspectos.

  - title: "Smart Monitoring - Monitorizacion Inteligente"
    category: funcionalidad
    content: |
      Smart Monitoring es la funcionalidad proactiva de Binnacle Data que monitoriza
      automaticamente productos, campanas, busquedas SEO, paginas y otras metricas.
      Caracteristicas clave:
      - Monitoriza automaticamente sin intervencion manual.
      - Analiza 20 metricas diferentes para identificar cambios relevantes de tendencia.
      - Detecta tendencias al alza y a la baja.
      Beneficios:
      - Alertas proactivas: recibes notificaciones sobre cambios significativos.
      - Decision agil: reacciona y toma decisiones tacticas de forma rapida.
      - Deteccion de oportunidades: capitaliza el impulso positivo.
      - Deteccion de problemas: alertas tempranas para contener metricas en declive.
      No necesitas buscar los problemas; Binnacle los encuentra por ti.

  - title: "Analisis de Productos"
    category: funcionalidad
    content: |
      El paquete de Analisis de Productos de Binnacle Data combina datos de multiples fuentes:
      - GA4 (Google Analytics 4)
      - Sistemas backoffice (e-commerce)
      - Google Merchant Center
      Proporciona dashboards de Performance Insights que identifican que productos funcionan
      bien o mal en diversos aspectos y combinaciones, ofreciendo informacion directamente
      accionable para trabajar tanto tacticamente como estrategicamente.

  - title: "Clusterizacion Inteligente - Boostic.cloud"
    category: funcionalidad
    content: |
      La Clusterizacion Inteligente es una funcionalidad de Boostic.cloud (producto hermano
      de Binnacle, tambien de Redegal) que transforma la gestion de catalogos e-commerce.
      Ofrece analisis y segmentacion automatizada de catalogos usando datos reales y actualizados
      de rendimiento por categorias, marcas y etiquetas personalizadas.
      Ventajas clave:
      - Agrupacion inteligente de productos basada en interacciones, ventas, clics, costes
        publicitarios y visibilidad organica.
      - Optimizacion SEM/SEO: prioriza productos de alto rendimiento y reduce gasto en
        productos que no convierten.
      - Analisis granular por categoria, marca o producto individual.
      Fuentes de datos integradas:
      - Google Analytics 4, Google Ads, plataformas e-commerce (Shopify, PrestaShop, Magento)
        y Google Merchant Center.
      Cada producto recibe evaluacion detallada con 17 metricas clave incluyendo clics,
      conversiones, costes publicitarios, informacion de marca, categorizacion, etiquetas
      personalizadas y niveles de stock.

  - title: "Clusters de Productos - Clasificacion"
    category: funcionalidad
    content: |
      La Clusterizacion Inteligente clasifica productos en 6 clusters:
      1. Champions: productos de alta facturacion con potencial de engagement medio-alto.
         Requieren inversion media-alta en medios de pago.
      2. Hidden Potential (Potencial Oculto): fuerte rendimiento en facturacion con margen
         de mejora en captacion de engagement. Algunos venden sin inversion publicitaria.
      3. Conversion Opportunities (Oportunidades de Conversion): alto potencial
         (impresiones, clics, adiciones al carrito) pero ventas debiles. Necesitan ajustes
         en pricing, campanas, SEO o paginas de producto.
      4. Inactive Assets (Activos Inactivos): actividad de ventas minima o nula y trafico
         negligible durante el periodo de analisis.
      5. Outliers (Valores Atipicos): metricas de rendimiento extremas; productos de alto
         coste que no convierten o items con costes por clic elevados sin ventas.
      6. Back Catalog (Catalogo Secundario): productos no bestsellers que representan
         volumen significativo del catalogo con rendimiento individual moderado-bajo.
      La clasificacion se basa en 3 ejes: potencial de conversion (carrito + impresiones),
      potencial SEO (impresiones y clics organicos) y rentabilidad (ventas, ingresos y gasto).
      Los umbrales son dinamicos y reflejan las caracteristicas especificas de cada catalogo.

  - title: "Caso de exito - Clusterizacion Inteligente"
    category: caso_exito
    content: |
      Un retailer e-commerce con mas de 300.000 referencias de productos logro con
      la Clusterizacion Inteligente de Boostic.cloud:
      - +64% de incremento en clics capturados.
      - +40% de mejora en eventos de adicion al carrito.
      - -50% de reduccion en gasto publicitario en productos que no convierten.
      Estos resultados demuestran el impacto directo de la segmentacion inteligente
      en la optimizacion de campanas SEM y rendimiento e-commerce.

  - title: "Casos de uso de la Clusterizacion"
    category: funcionalidad
    content: |
      1. Optimizacion de campanas SEM: identificacion de ROAS, ajustes de posicionamiento,
         deteccion de problemas de visibilidad organica, integracion con Google Ads para
         segmentacion automatizada basada en datos con inclusion/exclusion de productos por cluster.
      2. Estrategias SEO: analisis de clusters Hidden Potential y Conversion Opportunities
         para identificar oportunidades de crecimiento organico. Optimizacion de titulos,
         descripciones y contenido para mejorar trafico y conversion.
      3. Gestion de inventario y cross-selling: analisis del Back Catalog para planificacion
         de inventario y oportunidades de promocion de productos complementarios.

