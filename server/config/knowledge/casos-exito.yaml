entries:
  - title: "Caso de exito: ABANCA"
    category: caso_exito
    content: |
      Cliente: ABANCA - septimo banco de Espana por activos. Mas de 700 sucursales en Espana y 10 paises.
      Sector: Banca y finanzas.
      Region: Espana (Galicia).
      Servicios: Analitica digital, SEO, estrategia de contenidos, publicidad online.
      Detalle del proyecto:
      - Analitica digital: sistema completo de gestion de tags para medir resultados por tipo de formulario,
        ficha de producto y perfil de usuario.
      - SEO: auditoria web para optimizar factores on-site e identificar keywords de alto valor.
      - Contenido: creacion de contenido de calidad para blog para mejorar posicionamiento organico.
      - Publicidad: gestion de campanas en buscadores, redes sociales y display.
      Resultados:
      - Aparicion en primera pagina de Google con mejoras de mas de 60 posiciones.
      - Mas de 8.000 leads generados a traves de campanas digitales.
      - 2.800 nuevos contratos obtenidos.
      - Reduccion del 75% en coste por adquisicion mediante optimizacion continua.
      - Mejora de comunicaciones internas y externas gracias a insights de analitica digital.

  - title: "Caso de exito: Adolfo Dominguez"
    category: caso_exito
    content: |
      Cliente: Adolfo Dominguez - marca de moda espanola de renombre.
      Sector: Moda y retail.
      Region: Espana.
      Servicios: Publicidad online (Google Ads display y Gmail, Facebook e Instagram, YouTube),
      advertorials en medios de moda, SEM, Google Shopping, analitica digital.
      Campana: #yosoyadolfo - dar a conocer la campana en el entorno digital.
      Resultados:
      - 25,9 millones de impresiones publicitarias generadas.
      - +320% de incremento en compras a traves de campanas publicitarias.
      - Mas de 313.000 reproducciones de video.
      - Superacion de objetivos de ventas iniciales.
      Tras el exito, Adolfo Dominguez continuo la colaboracion con Redegal para mantener
      su posicion como marca lider en canales digitales.

  - title: "Caso de exito: Pescanova"
    category: caso_exito
    content: |
      Cliente: Pescanova - multinacional de comercializacion de productos del mar.
      Sector: Alimentacion y bebidas.
      Region: Internacional (9 paises: Espana, Portugal, Francia, Italia, Grecia, EEUU, Peru, Sudafrica, Brasil).
      Servicios: Desarrollo e-commerce, Paid Media, SEO.
      Detalle del proyecto:
      - Rediseno completo de web con elementos de identidad de marca.
      - Migracion internacional: unificacion de presencia web de 9 paises en un unico dominio
        con localizacion por idioma. Coordinacion de equipos de marketing y desarrollo.
      - Activacion de campanas de paid media en multiples canales.
      - Monitorizacion de posicionamiento organico con foco en e-commerce y contenido de recetas.
      Resultados:
      - Incremento de ventas.
      - Migracion exitosa con minimo impacto en posicionamiento organico.
      - Mejora de navegacion y trafico web gracias al nuevo diseno basado en usabilidad.
      - Mayor visibilidad de marca en multiples mercados.

  - title: "Caso de exito: Under Armour"
    category: caso_exito
    content: |
      Cliente: Under Armour - marca internacional de ropa deportiva.
      Sector: Moda deportiva / Indumentaria.
      Region: Mexico.
      Servicios: SEO, estrategia de contenidos, link building.
      Detalle del proyecto:
      - Optimizacion de contenido y on-page.
      - Estrategias de enlazado interno.
      - Link building estrategico: adquisicion de enlaces en medios, blogs tematicos y sitios educativos.
      Resultados:
      - +36% de incremento en trafico organico respecto al ano anterior.
      - Media de 600.000 usuarios mensuales.
      - +43% de incremento en keywords totales.
      - Composicion de trafico: 77% keywords de marca, 23% genericas.
      - Mas de 2.500 keywords en Top 3 de posiciones.
      - CTR incrementado en +1,4% interanual.
      - Mejora de reputacion y autoridad de marca en el sector deportivo en Mexico.

  - title: "Caso de exito: Laboratorio Medico del Chopo"
    category: caso_exito
    content: |
      Cliente: Laboratorio Medico del Chopo - laboratorio medico lider de Mexico.
      330+ sucursales y 27 centros especializados. Mas de 2.500 estudios de diagnostico e imagen.
      Sector: Salud / Diagnostico medico.
      Region: Mexico.
      Servicios: Desarrollo e-commerce (Magento), diseno web, integracion de sistemas, seguridad de datos.
      Detalle del proyecto:
      - Nueva tienda online basada en Magento.
      - Enfoque mobile-first con foco en experiencia de usuario.
      - Sistema integrado de reserva de citas online y presenciales.
      - Seleccion de servicios basada en ubicacion (centro de diagnostico mas cercano).
      - Seccion especializada COVID-19 con recogida a domicilio y citas en laboratorio.
      - Cumplimiento de normativa de proteccion de datos personales y sensibles.
      Resultados:
      - Aproximadamente +200% de incremento en ventas.
      - Mas de +60% de crecimiento en trafico web.
      - Transformacion de web promocional a plataforma de comercio digital funcional.

  - title: "Caso de exito: Milenio"
    category: caso_exito
    content: |
      Cliente: Milenio - periodico lider mexicano fundado en 1974 en Monterrey.
      Edicion digital desde 2008, canal de television 24 horas.
      Sector: Medios y comunicacion.
      Region: Mexico.
      Servicios: SEO para medios digitales.
      Detalle del proyecto:
      - Optimizaciones on-page tras auditoria SEO inicial.
      - SEO en tiempo real para cobertura de noticias de ultima hora.
      - Directrices editoriales SEO para equipos de contenido.
      - Posicionamiento estrategico para rankings de busqueda competitivos.
      Resultados:
      - +338,48% de incremento en trafico de calidad.
      - +300% de crecimiento en paginas vistas.
      - +58,64% de incremento en duracion de sesion.
      Testimonio del cliente: "Resultados reflejados en aumento de visitas y usuarios al portal...
      atencion siempre oportuna y eficaz."

  - title: "Caso de exito: McCain Foodservice"
    category: caso_exito
    content: |
      Cliente: McCain Foodservice - division de alimentacion congelada para hosteleria (Horeca).
      Productos: patatas, aperitivos, snacks y postres listos para preparar.
      Sector: Alimentacion y bebidas.
      Region: Espana.
      Servicios: SEO, estrategia de contenidos, Google Ads (campanas de branding y awareness).
      Detalle del proyecto:
      - Auditoria SEO completa y mejoras on-page.
      - Creacion y gestion de contenido para crecimiento de trafico organico.
      - Campanas de Google Ads multicanal para notoriedad de marca.
      Resultados:
      - Mas de 2.000.000 de impresiones publicitarias en diferentes canales.
      - Mas de 6.000 clics durante la ejecucion de campanas.
      - Mejora significativa del posicionamiento de marca de McCain Foodservice.

  - title: "Caso de exito: Oney"
    category: caso_exito
    content: |
      Cliente: Oney - empresa de servicios financieros europea.
      Mas de 20 anos operando en Espana, 1+ millon de clientes en Espana y 7,8 millones en 12 paises.
      Sector: Finanzas / Fintech.
      Region: Espana.
      Servicios: Estrategia de contenidos, publicidad online, analitica digital.
      Detalle del proyecto:
      - Planificacion mensual de contenido para redes sociales con temas relevantes para usuarios.
      - Campanas de rendimiento y branding en Google y +30 plataformas de afiliacion.
      - Tracking de leads y analisis de atribucion para medir efectividad de campanas.
      Resultados:
      - Incremento del trafico cualitativo al sitio web para generacion de nuevos leads.
      - Mejoras en tasas de conversion.
      - Mayor visibilidad de marca multicanal.
      - Crecimiento en volumen de leads captados con interes en solicitudes de prestamos
        y en la firma de prestamos.

  - title: "Caso de exito: Pedro Garcia"
    category: caso_exito
    content: |
      Cliente: Pedro Garcia - marca de calzado de lujo espanola.
      Sector: Moda / Calzado de lujo.
      Region: Internacional (foco en mercado EEUU).
      Servicios: Desarrollo e-commerce (migracion a Shopify), Paid Media, SEO, analitica digital.
      Detalle del proyecto:
      - Migracion exitosa de Salesforce a Shopify con minimo impacto en posicionamiento organico.
      - Optimizacion de Google Ads y estrategia de campanas internacionales.
      - Posicionamiento de keywords y mejora de visibilidad organica.
      - Tracking de rendimiento basado en datos en todos los canales.
      - Foco en adquisicion de trafico internacional cualificado.
      - Priorizacion de velocidad de pagina, privacidad de datos y gobernanza en la migracion.
      Resultados:
      - Superacion de objetivos de ventas anuales: +55% en ticket medio en todos los canales.
      - Superacion del objetivo de crecimiento de +40% para el ano.
      - CTR (Click-Through Rate) incrementado en +23,5%.
      - Tasa de conversion de paid media: +155,55%.
      - Keywords posicionadas: +113%.
      - Visibilidad de busqueda: +534%.

  - title: "Caso de exito: Gocco"
    category: caso_exito
    content: |
      Cliente: Gocco - marca de moda (infantil/familiar).
      Sector: Moda / Retail.
      Region: Espana.
      Servicios: SEO, Paid Media (Google Ads y Meta Ads), Web Analytics.
      Detalle del proyecto:
      - SEO: optimizacion on-page, creacion de contenido, datos estructurados, filtrado por edad.
      - Paid Media: estrategia multicanal en Google Ads y Meta Ads.
      - Analitica web: implementacion de medicion, mejoras de privacidad, reduccion de discrepancias.
      Resultados:
      - SEO: +83,2% de incremento en clics para categoria principal, +87,4% de visibilidad.
        400+ keywords adicionales en Top 10.
      - Paid Media: ROI del 6490%. CPA por debajo de medias historicas.
        17+ millones de impresiones con CTR medio de 2,70%.
        85%+ de ventas de Performance Max provenientes de terminos genericos/competencia.
        36% de conversiones de nuevos usuarios via Performance Max.
      - Impacto en negocio: +47,10% de incremento en transacciones YoY.
        +59,10% de crecimiento de ingresos respecto al ano anterior.
