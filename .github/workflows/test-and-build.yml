name: Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rdgbot_test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm -w server run lint 2>/dev/null || true

      - name: Run tests (server)
        run: npm -w server test -- --coverage --forceExit
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/rdgbot_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Run tests (widget)
        run: npm -w widget test -- --run

      - name: Run tests (dashboard)
        run: npm -w dashboard test -- --run

      - name: Build widget
        run: npm -w widget run build

      - name: Build dashboard
        run: npm -w dashboard run build

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage/coverage-final.json

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  deploy-staging:
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          # SSH deployment script here
          # scp -r dist/* user@staging-server:/app/
          # ssh user@staging-server "docker compose up -d"
