name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint server (syntax check)
        run: |
          echo "Checking JavaScript syntax in server/..."
          find server -name '*.js' -not -path '*/node_modules/*' | while read f; do
            node -c "$f" || exit 1
          done
          echo "All server files have valid syntax."

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: rdgbot_test
          POSTGRES_USER: redegal
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U redegal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: rdgbot_test
          POSTGRES_USER: redegal
          POSTGRES_PASSWORD: testpass
          POSTGRES_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
        run: npm -w server test

  build-widget:
    name: Build Widget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build widget
        run: npm -w widget run build

      - name: Verify build output
        run: |
          ls -la widget/dist/
          echo "Widget build completed successfully."

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm -w dashboard run build

      - name: Verify build output
        run: |
          ls -la dashboard/dist/
          echo "Dashboard build completed successfully."

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, build-widget, build-dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Build server Docker image
        run: docker build -t sarah-server:ci ./server

      - name: Verify image
        run: docker image inspect sarah-server:ci --format '{{.Size}}'
