<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg_grad)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="300" fill="#10b981" opacity="0.03"/>
  <circle cx="1700" cy="800" r="400" fill="#6c5ce7" opacity="0.03"/>

  <!-- Top accent line -->
  <rect x="860" y="60" width="200" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Title -->
  <text x="960" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="52" font-weight="800" fill="#10b981">🟢 WebRTC — Conversación</text>

  <!-- Subtitle -->
  <text x="960" y="460" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="28" fill="#e2e8f0" opacity="0.8">Descubrimiento de necesidades del cliente</text>

  <!-- Speaker indicator -->
  <rect x="760" y="560" width="400" height="50" rx="25" fill="#3b82f6" opacity="0.15"/>
  <text x="960" y="592" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#3b82f6" font-weight="600">🎤 David (Agente)</text>

  <!-- Current speech text -->
  <text x="960" y="680" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#94a3b8" font-style="italic" opacity="0.7">&quot;Perfecto, tenemos mucha experiencia en SEO para ecommerce. ¿Cuál es su facturaci&quot;</text>

  <!-- Branding -->
  <text x="960" y="1020" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="16" fill="#475569">Redegal Chatbot — WebRTC + Click2Call Demo</text>
</svg>